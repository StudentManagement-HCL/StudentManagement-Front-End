<div class="login-container">
  <div class="login-card">
    <h2>Student Management System</h2>
    <h3>Login</h3>

    <!-- Role Toggle -->
    <div class="role-toggle">
      <button [class.active]="role === 'Student'" (click)="role = 'Student'">Student</button>
      <button [class.active]="role === 'Admin'" (click)="role = 'Admin'">Admin</button>
    </div>

    <!-- Error Message -->
    <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

    <!-- Login Form -->
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password" />
    </div>

    <button class="btn-login" (click)="login()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>
    <div class="signup-links">
  <p *ngIf="role === 'Student'">
    New student? <a routerLink="/student-signup">Register here</a>
  </p>
  <p *ngIf="role === 'Admin'">
    New admin? <a routerLink="/admin-signup">Register here</a>
  </p>
</div>
  </div>
</div>
