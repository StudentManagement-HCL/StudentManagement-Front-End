<div class="signup-container">
  <div class="signup-card">
    <h2>Student Management System</h2>
    <h3>Student Signup</h3>

    <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" [(ngModel)]="formData.firstName" placeholder="Enter first name" />
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" [(ngModel)]="formData.lastName" placeholder="Enter last name" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Gender *</label>
        <select [(ngModel)]="formData.gender">
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date of Birth *</label>
        <input type="date" [(ngModel)]="formData.doB" />
      </div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" [(ngModel)]="formData.email" placeholder="Enter email" />
    </div>

    <div class="form-group">
      <label>Phone Number *</label>
      <input type="text" [(ngModel)]="formData.phoneNumber" placeholder="Enter 10-digit phone number" maxlength="10" />
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input type="password" [(ngModel)]="formData.password" placeholder="Create password" />
    </div>

    <div class="form-group">
      <label>Confirm Password *</label>
      <input type="password" [(ngModel)]="formData.confirmPassword" placeholder="Confirm password" />
    </div>

    <button class="btn-submit" (click)="register()" [disabled]="loading">
      {{ loading ? 'Registering...' : 'Signup' }}
    </button>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
